<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="バスケコーチくん">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <title>バスケコーチくん</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 設定画面 -->
  <div id="setup-screen" class="screen">
    <h1>🏀 バスケコーチくん</h1>

    <div class="card">
      <label>Gemini API キー（複数ならカンマ区切り）</label>
      <input type="password" id="api-key-input" placeholder="AIza...,AIza..." autocomplete="off">
      <button id="save-key-btn" class="btn-secondary">保存</button>
    </div>

    <div class="card">
      <label>🎯 追う選手の写真</label>
      <div id="ref-preview-wrap" class="hidden">
        <img id="ref-preview" alt="登録済み参考写真">
        <button id="ref-clear-btn" class="btn-secondary">✕ 削除</button>
      </div>
      <label id="ref-upload-label" class="btn-upload">
        📷 写真を登録する
        <input type="file" id="ref-photo-input" accept="image/*">
      </label>
      <small style="color:#888">試合前に選手の顔・背番号が見える写真を撮っておくと精度アップ</small>
    </div>

    <div class="card">
      <label>🔢 背番号 / ユニフォーム色（写真なし時に使用）</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="player-number" placeholder="例: 6" style="width:50%">
        <input type="text" id="player-color" placeholder="例: 白" style="width:50%">
      </div>
    </div>

    <div class="card">
      <label>解析間隔（秒）</label>
      <input type="range" id="interval-input" min="2" max="15" value="7" step="1">
      <span id="interval-display">7秒</span>
      <small style="color:#888">無料枠は7秒以上推奨（10req/分）</small>
    </div>

    <div class="card">
      <label>音声指示（攻撃時）</label>
      <input type="text" id="offense-text" value="攻撃です。シュートを狙って。">
    </div>
    <div class="card">
      <label>音声指示（守備時）</label>
      <input type="text" id="defense-text" value="守備に切り替え。マークにつけ。">
    </div>

    <details style="margin-bottom:12px">
      <summary style="color:#666;font-size:0.85rem;cursor:pointer;padding:4px 0">デバッグ用: 動画ファイルで動作確認</summary>
      <div class="card" style="margin-top:8px">
        <label>動画ファイル（選択するとカメラの代わりに使用）</label>
        <input type="file" id="video-file-input" accept="video/*" style="color:#ccc;font-size:0.9rem">
      </div>
    </details>

    <button id="start-btn" class="btn-primary">▶ 開始</button>
  </div>

  <!-- メイン画面 -->
  <div id="main-screen" class="screen hidden">
    <div id="status-bar">
      <span id="phase-label">--</span>
      <button id="stop-btn" class="btn-stop">■ 停止</button>
    </div>
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="capture-canvas" class="hidden"></canvas>
    <div id="log">
      <p class="log-hint">解析ログ</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
